<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Service Admin</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232733;
    --border: #2e3345;
    --text: #e1e4ed;
    --text2: #8b90a0;
    --accent: #6c5ce7;
    --accent2: #a29bfe;
    --green: #00cec9;
    --orange: #fdcb6e;
    --red: #ff7675;
    --blue: #74b9ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .app {
    display: flex;
    height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }

  .sidebar h1 {
    font-size: 14px;
    padding: 0 20px 20px;
    color: var(--accent2);
    letter-spacing: 2px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    cursor: pointer;
    color: var(--text2);
    font-size: 13px;
    transition: all 0.15s;
  }

  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { color: var(--accent2); background: var(--surface2); border-right: 2px solid var(--accent); }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
  .nav-item .badge {
    margin-left: auto;
    background: var(--surface2);
    color: var(--text2);
    font-size: 11px;
    padding: 1px 7px;
    border-radius: 10px;
  }
  .nav-item.active .badge { background: var(--accent); color: white; }
  .nav-item-bottom {
    margin-top: auto;
    border-top: 1px solid var(--border);
    padding-top: 14px;
  }

  /* Main */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 30px;
  }

  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .page-header h2 {
    font-size: 20px;
    font-weight: 600;
  }

  .page-title {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .page-header .subtitle {
    color: var(--text2);
    font-size: 12px;
    margin-top: 4px;
  }

  .page-description {
    color: var(--text2);
    font-size: 12px;
    font-style: italic;
    font-weight: 400;
  }

  /* Stats row */
  .stats {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    flex: 1;
  }

  .stat-card .label { color: var(--text2); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  .stat-card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
  .stat-card .value.purple { color: var(--accent2); }
  .stat-card .value.green { color: var(--green); }
  .stat-card .value.orange { color: var(--orange); }
  .stat-card .value.blue { color: var(--blue); }

  /* Table */
  .table-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    text-align: left;
    padding: 12px 16px;
    background: var(--surface2);
    color: var(--text2);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
  }

  tbody td {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }

  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }

  .tag-purple { background: rgba(108,92,231,0.2); color: var(--accent2); }
  .tag-green { background: rgba(0,206,201,0.2); color: var(--green); }
  .tag-orange { background: rgba(253,203,110,0.2); color: var(--orange); }
  .tag-blue { background: rgba(116,185,255,0.2); color: var(--blue); }
  .tag-red { background: rgba(255,118,117,0.2); color: var(--red); }

  /* Detail panels */
  .detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  .detail-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
  }

  .detail-card h3 {
    font-size: 15px;
    margin-bottom: 4px;
  }

  .detail-card .meta {
    color: var(--text2);
    font-size: 12px;
    margin-bottom: 12px;
  }

  .detail-card .items {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 12px;
    color: var(--text);
  }

  .pill .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .loading {
    color: var(--text2);
    padding: 40px;
    text-align: center;
  }

  a.link {
    color: var(--accent2);
    text-decoration: none;
    cursor: pointer;
  }
  a.link:hover { text-decoration: underline; }

  .pill.clickable, .tag.clickable {
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .pill.clickable:hover, .tag.clickable:hover { opacity: 0.8; }

  .breadcrumb {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 16px;
  }
  .breadcrumb a { color: var(--text2); text-decoration: none; cursor: pointer; }
  .breadcrumb a:hover { color: var(--accent2); }

  .detail-section {
    margin-top: 20px;
  }
  .detail-section h3 {
    font-size: 13px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .field-grid {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 8px 16px;
    font-size: 13px;
    margin-bottom: 20px;
  }
  .field-grid .label { color: var(--text2); }

  .action-bar {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .action-bar input, .action-bar select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 12px;
  }
  .action-bar input:focus, .action-bar select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    font-weight: 600;
  }
  .btn:hover { opacity: 0.9; }
  .btn-sm { padding: 4px 10px; font-size: 11px; }

  details[open] .collapse-arrow { transform: rotate(90deg); }
  details summary::-webkit-details-marker { display: none; }

  .nav-section {
    font-size: 10px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 12px 20px 4px;
    margin-top: 4px;
  }

  .relationship-map-shell {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .relationship-map-notes {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 14px;
  }

  .relationship-map-note {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text2);
    font-size: 12px;
    line-height: 1.5;
  }

  .relationship-map-note code {
    font-family: inherit;
    color: var(--accent2);
  }

  .relationship-map-scroll {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: auto;
    padding: 16px;
  }

  .relationship-map-svg {
    display: block;
    width: 1280px;
    max-width: none;
    height: auto;
    background:
      radial-gradient(circle at top, rgba(162, 155, 254, 0.08), transparent 34%),
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px),
      var(--bg);
    background-size: auto, 24px 24px, 24px 24px, auto;
    border-radius: 8px;
  }

  .relationship-cluster {
    stroke: rgba(255,255,255,0.08);
    stroke-width: 1;
  }

  .relationship-cluster-label {
    fill: var(--text2);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .relationship-edge {
    fill: none;
    stroke: rgba(255,255,255,0.16);
    stroke-width: 2;
    marker-end: url(#relationship-arrow);
  }

  .relationship-edge.optional {
    stroke-dasharray: 7 7;
  }

  .relationship-edge.is-dimmed {
    opacity: 0.32;
  }

  .relationship-edge.is-active {
    stroke: rgba(162, 155, 254, 0.72);
    stroke-width: 2.5;
  }

  .relationship-node-group.is-clickable {
    cursor: pointer;
  }

  .relationship-node-group.is-clickable:hover .relationship-node-card {
    opacity: 0.95;
  }

  .relationship-node-group.is-dimmed {
    opacity: 0.46;
  }

  .relationship-node-group.is-related .relationship-node-card {
    stroke-width: 2;
  }

  .relationship-node-group.is-primary .relationship-node-card {
    stroke-width: 2.6;
  }

  .relationship-node-card {
    stroke-width: 1.5;
  }

  .relationship-node-count-badge {
    fill: rgba(15, 17, 23, 0.82);
    stroke: rgba(255,255,255,0.14);
    stroke-width: 1;
  }

  .relationship-node-title {
    fill: var(--text);
    font-size: 13px;
    font-weight: 700;
    text-anchor: middle;
  }

  .relationship-node-count {
    fill: var(--text2);
    font-size: 11px;
    font-weight: 700;
    text-anchor: middle;
  }

  .relationship-map-inspector-empty {
    color: var(--text2);
    font-size: 13px;
  }

  .relationship-inspector-description {
    color: var(--text2);
    font-size: 13px;
    line-height: 1.5;
  }

  .relationship-column-flags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .relationship-inspector-actions {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }

</style>
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <h1>GameSvc</h1>

    <div class="nav-item" data-view="users">
      <span class="icon">◉</span> Users <span class="badge" id="badge-users">-</span>
    </div>
    <div class="nav-item" data-view="games">
      <span class="icon">◆</span> Games <span class="badge" id="badge-games">-</span>
    </div>
    <div class="nav-item" data-view="mods">
      <span class="icon">⬢</span> Mods <span class="badge" id="badge-mods">-</span>
    </div>
    <div class="nav-item" data-view="leagues">
      <span class="icon">▥</span> Leagues <span class="badge" id="badge-leagues">-</span>
    </div>

    <div class="nav-item" data-view="rankings">
      <span class="icon">★</span> Rankings <span class="badge" id="badge-rankings">-</span>
    </div>
    <div class="nav-item" data-view="submissions">
      <span class="icon">◇</span> Submissions <span class="badge" id="badge-submissions">-</span>
    </div>
    <div class="nav-item" data-view="division_entries">
      <span class="icon">◈</span> Division Entries <span class="badge" id="badge-division_entries">-</span>
    </div>
    <div class="nav-item" data-view="division_entry_events">
      <span class="icon">⇄</span> Division History <span class="badge" id="badge-division_entry_events">-</span>
    </div>
    <div class="nav-item" data-view="episode_requests">
      <span class="icon">✦</span> Episode Requests <span class="badge" id="badge-episode_requests">-</span>
    </div>
    <div class="nav-item" data-view="episodes">
      <span class="icon">▶</span> Episodes <span class="badge" id="badge-episodes">-</span>
    </div>
    <div class="nav-item" data-view="rounds">
      <span class="icon">↻</span> Rounds <span class="badge" id="badge-rounds">-</span>
    </div>
    <div class="nav-item nav-item-bottom" data-view="relationship_map">
      <span class="icon">⋈</span> Relationship Map
    </div>
  </nav>
  <main class="main" id="content">
    <div class="loading">Loading...</div>
  </main>
</div>

<script>
const state = {};
state.relationshipMapHover = null;
state.relationshipMapSelection = null;
const OBJECT_DESCRIPTIONS = {
  users: 'human accounts',
  players: 'submitters of policies, possibly agents',
  policy_versions: 'concrete uploaded artifacts (model checkpoints) owned by a player; the atomic unit of competition',
  submissions: 'requests to enter a policy into a league, including status, preferences, and optional predecessor',
  placements: 'commissioner actions that place a policy into a division, optionally in response to a submission',
  mods: 'collections of variants that all belong to the same Game',
  games: 'top-level game definitions that own leagues and mods',
  leagues: 'competition tracks for a specific game and mod, governed by one commissioner',
  divisions: 'tiers within a league that hold placed policies and division champions',
  projects: 'player-owned workstreams for improving or researching policies, tracked by status updates',
  episode_requests: 'requests to run episodes for selected policies under a specific config, seed, and episode count',
  variants: 'reusable configuration bundles linked to mods and used to generate episodes',
  mod_variants: 'joins mods to the variants they support, with an optional canonical marker',
    rankings: 'time-stamped policy standings, plus derived best-per-player and best-per-user leaderboards',
  episodes: 'individual simulated games for one variant and seed, with policy results and logs',
  episode_policies: 'per-policy results within an episode, including agent slot, score, and logs',
  episode_logs: 'artifact references attached to an episode, such as replay and metrics logs',
  rounds: 'competition rounds within a division that aggregate results across one or more episodes',
  round_episodes: 'joins rounds to the episodes that make up those rounds',
  player_league_memberships: 'joins players to leagues, with an optional avatar flag',
  division_entry_events: 'append-only history of division entry changes',
  status_updates: 'timestamped updates attached to a project',
  division_entries: 'joins policies to divisions, with an optional champion marker',
  round_results: 'final aggregated result for a policy version in a round',
  relationship_map: 'Generated from the live SQLite schema',
};

const RELATIONSHIP_GRAPH_TONES = [
  { fill: 'rgba(108, 92, 231, 0.15)', stroke: 'rgba(162, 155, 254, 0.75)', cluster: 'rgba(108, 92, 231, 0.05)' },
  { fill: 'rgba(116, 185, 255, 0.14)', stroke: 'rgba(116, 185, 255, 0.72)', cluster: 'rgba(116, 185, 255, 0.05)' },
  { fill: 'rgba(253, 203, 110, 0.14)', stroke: 'rgba(253, 203, 110, 0.72)', cluster: 'rgba(253, 203, 110, 0.05)' },
  { fill: 'rgba(0, 206, 201, 0.14)', stroke: 'rgba(0, 206, 201, 0.72)', cluster: 'rgba(0, 206, 201, 0.05)' },
];

const MODEL_ROUTE_PATHS = new Set([
  'users',
  'players',
  'policy_versions',
  'submissions',
  'division_entries',
  'division_entry_events',
  'games',
  'mods',
    'leagues',
  'divisions',
  'projects',
  'episode_requests',
  'variants',
  'episodes',
  'rounds',
]);

const RELATIONSHIP_CATEGORIES = [
  {
    key: 'identity',
    title: 'IDENTITY & OWNERSHIP',
    toneIndex: 0,
    tables: ['users', 'players', 'policy_versions', 'projects', 'status_updates', 'episode_requests', 'episode_request_policies'],
  },
  {
    key: 'config',
    title: 'GAME CONFIGURATION',
    toneIndex: 1,
    tables: ['games', 'mods', 'variants', 'mod_variants'],
  },
  {
    key: 'competition',
    title: 'COMPETITION STRUCTURE',
    toneIndex: 2,
    tables: ['leagues', 'divisions', 'player_league_memberships', 'submissions', 'division_entries', 'division_entry_events', 'round_results'],
  },
  {
    key: 'simulation',
    title: 'SIMULATION & RESULTS',
    toneIndex: 3,
    tables: ['episodes', 'episode_policies', 'episode_logs', 'rounds', 'round_episodes', 'pools', 'pool_entries'],
  },
];

async function fetchAll() {
  const endpoints = ['users','players','policy_versions','games','mods','submissions','division_entries','division_entry_events','leagues','divisions','rank_users','rank_players','round_results','projects','status_updates','episode_requests','variants','mod_variants','episodes','episode_policies','episode_logs','rounds','round_episodes','player_league_memberships','pools','pool_entries','episode_request_policies','schema'];
  const results = await Promise.all(endpoints.map(async e => {
    const response = await fetch(`/api/${e}`);
    const text = await response.text();
    try {
      return JSON.parse(text);
    } catch (error) {
      if (e === 'schema') return null;
      throw error;
    }
  }));
  endpoints.forEach((e, i) => state[e] = results[i]);

  document.getElementById('badge-users').textContent = state.users.length;

  document.getElementById('badge-games').textContent = state.games.length;
  document.getElementById('badge-mods').textContent = state.mods.length;
  document.getElementById('badge-submissions').textContent = state.submissions.length;
  document.getElementById('badge-division_entries').textContent = state.division_entries.length;
  document.getElementById('badge-division_entry_events').textContent = state.division_entry_events.length;
  document.getElementById('badge-leagues').textContent = state.leagues.length;
  
  if (document.getElementById('badge-divisions')) document.getElementById('badge-divisions').textContent = state.divisions.length;
  document.getElementById('badge-episode_requests').textContent = state.episode_requests.length;
  document.getElementById('badge-rankings').textContent = state.rank_users.length + state.rank_players.length + state.round_results.length;
  document.getElementById('badge-episodes').textContent = state.episodes.length;
  document.getElementById('badge-rounds').textContent = state.rounds.length;
}

// --- Link helpers ---
function link(type, id, label, cls) {
  return `<a class="link ${cls||''}" onclick="navigate('${type}/${id}')">${label}</a>`;
}
function tagLink(type, id, label, color) {
  return `<span class="tag tag-${color} clickable" onclick="navigate('${type}/${id}')">${label}</span>`;
}
function pillLink(type, id, label, dotColor) {
  return `<div class="pill clickable" onclick="navigate('${type}/${id}')"><span class="dot" style="background:var(--${dotColor})"></span>${label}</div>`;
}
function divisionMembershipLink(dp, color) {
  const division = tagLink('divisions', dp.division_id, dp.division_name, color || 'purple');
  return dp.is_champion ? `${division} <span class="tag tag-green" style="font-size:10px">champion</span>` : division;
}
function policyDivisionLink(dp, color) {
  const policy = tagLink('policy_versions', dp.policy_version_id, dp.policy_version_name, color || 'orange');
  return dp.is_champion ? `${policy} <span class="tag tag-green" style="font-size:10px">champion</span>` : policy;
}
function renderSubmissionStatus(status) {
  const tone = status === 'placed' ? 'green' : status === 'rejected' ? 'red' : 'orange';
  return `<span class="tag tag-${tone}">${status}</span>`;
}
function renderEntrySource(entry) {
  return '<span class="tag tag-purple">entry</span>';
}
function getCurrentLeagueDivisionEntry(pvId, leagueId) {
  return state.division_entries.find(de => de.policy_version_id === pvId && de.league_id === leagueId && de.is_active) || null;
}
function renderObjectTitle(title, key) {
  const description = OBJECT_DESCRIPTIONS[key];
  const descriptionText = description
    ? `<span class="page-description">${description}</span>`
    : '';
  return `<div class="page-title"><h2>${title}</h2>${descriptionText}</div>`;
}
function renderPageHeader(title, subtitle, key) {
  const subtitleHtml = subtitle ? `<div class="subtitle">${subtitle}</div>` : '';
  return `<div class="page-header"><div>${renderObjectTitle(title, key)}${subtitleHtml}</div></div>`;
}
function escapeHtml(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
function titleizeModelName(name) {
  return name
    .split('_')
    .map(part => part ? part[0].toUpperCase() + part.slice(1) : part)
    .join(' ');
}
function splitModelTitle(name) {
  const words = titleizeModelName(name).split(' ');
  const title = words.join(' ');
  if (title.length <= 16 || words.length === 1) return [title];
  if (words.length === 2) return words;
  const midpoint = Math.ceil(words.length / 2);
  return [words.slice(0, midpoint).join(' '), words.slice(midpoint).join(' ')];
}
function getSchemaTables() {
  return state.schema?.tables || [];
}
function getSchemaTableLookup() {
  return Object.fromEntries(getSchemaTables().map(table => [table.name, table]));
}
function getSchemaRelationships() {
  return getSchemaTables().flatMap(table =>
    (table.foreign_keys || []).map(fk => ({
      child: table.name,
      parent: fk.table,
      field: fk.from,
      targetField: fk.to,
      optional: Boolean(fk.optional),
    }))
  );
}
function getRouteForModel(name) {
  return MODEL_ROUTE_PATHS.has(name) ? name : null;
}
function getModelDescription(name) {
  return OBJECT_DESCRIPTIONS[name] || 'No description available.';
}
function getSchemaTable(name) {
  return getSchemaTableLookup()[name] || null;
}
function getConnectedRelationshipNames(name) {
  const connected = new Set([name]);
  getSchemaRelationships().forEach(rel => {
    if (rel.parent === name || rel.child === name) {
      connected.add(rel.parent);
      connected.add(rel.child);
    }
  });
  return connected;
}
function isRelationshipJunctionTable(table) {
  const foreignKeyColumns = new Set((table.foreign_keys || []).map(fk => fk.from));
  if (foreignKeyColumns.size < 2) return false;

  const nonSystemColumns = (table.columns || [])
    .map(column => column.name)
    .filter(name => name !== 'notes' && name !== 'created_at');

  return nonSystemColumns.every(name =>
    name === 'id' ||
    foreignKeyColumns.has(name) ||
    name === 'canonical' ||
    name.startsWith('is_')
  );
}
function getRelationshipLaneOffset(index) {
  const step = 14;
  const band = Math.floor(index / 2) + 1;
  return (index % 2 === 0 ? -1 : 1) * band * step;
}
function buildRelationshipGraphLayout() {
  const tables = getSchemaTables().map(table => ({
    ...table,
    title: titleizeModelName(table.name),
    route: getRouteForModel(table.name),
  }));
  if (!tables.length) return null;

  const relationships = getSchemaRelationships();
  const categoryEntries = RELATIONSHIP_CATEGORIES.map(category => ({
    ...category,
    tone: RELATIONSHIP_GRAPH_TONES[category.toneIndex % RELATIONSHIP_GRAPH_TONES.length],
    names: [],
  }));
  const categoryByTable = Object.fromEntries(RELATIONSHIP_CATEGORIES.flatMap(category =>
    category.tables.map(tableName => [tableName, category.key])
  ));
  const categoryLookup = Object.fromEntries(categoryEntries.map(category => [category.key, category]));
  const uncategorized = [];
  tables.forEach(table => {
    const categoryKey = categoryByTable[table.name];
    if (categoryKey && categoryLookup[categoryKey]) {
      categoryLookup[categoryKey].names.push(table.name);
    } else {
      uncategorized.push(table.name);
    }
  });
  if (uncategorized.length) {
    categoryEntries.push({
      key: 'other',
      title: 'OTHER',
      tone: RELATIONSHIP_GRAPH_TONES[categoryEntries.length % RELATIONSHIP_GRAPH_TONES.length],
      tables: [],
      names: uncategorized.sort((left, right) => titleizeModelName(left).localeCompare(titleizeModelName(right))),
    });
  }

  categoryEntries.forEach(category => {
    const configuredOrder = new Map(category.tables.map((tableName, index) => [tableName, index]));
    category.names.sort((left, right) => {
      const leftIndex = configuredOrder.has(left) ? configuredOrder.get(left) : Number.MAX_SAFE_INTEGER;
      const rightIndex = configuredOrder.has(right) ? configuredOrder.get(right) : Number.MAX_SAFE_INTEGER;
      if (leftIndex !== rightIndex) return leftIndex - rightIndex;
      return titleizeModelName(left).localeCompare(titleizeModelName(right));
    });
  });

  const nodeWidth = 190;
  const nodeHeight = 60;
  const smallNodeWidth = 158;
  const smallNodeHeight = 48;
  const horizontalGap = 72;
  const verticalGap = 24;
  const compactGap = 16;
  const marginX = 46;
  const marginTop = 78;
  const marginBottom = 48;
  const clusterPad = 18;
  const width = marginX + (categoryEntries.length * nodeWidth) + (Math.max(0, categoryEntries.length - 1) * horizontalGap) + marginX;

  const defaultNodes = tables.map(table => {
    const categoryIndex = categoryEntries.findIndex(category => category.names.includes(table.name));
    const category = categoryEntries[categoryIndex];
    const index = category.names.indexOf(table.name);
    const isSmall = isRelationshipJunctionTable(table);
    const width = isSmall ? smallNodeWidth : nodeWidth;
    const height = isSmall ? smallNodeHeight : nodeHeight;
    const defaultY = marginTop + index * (nodeHeight + verticalGap) + ((nodeHeight - height) / 2);
    return {
      ...table,
      categoryIndex,
      categoryKey: category.key,
      x: marginX + categoryIndex * (nodeWidth + horizontalGap) + ((nodeWidth - width) / 2),
      y: defaultY,
      desiredY: defaultY,
      width,
      height,
      lines: splitModelTitle(table.name),
      tone: category.tone,
      isSmall,
    };
  });

  const defaultNodeByName = Object.fromEntries(defaultNodes.map(node => [node.name, node]));
  defaultNodes.forEach(node => {
    if (!node.isSmall) return;
    const anchorNodes = (node.foreign_keys || [])
      .map(fk => defaultNodeByName[fk.table])
      .filter(Boolean);
    if (anchorNodes.length < 2) return;
    const anchorCenter = anchorNodes.reduce((sum, anchor) => sum + anchor.y + (anchor.height / 2), 0) / anchorNodes.length;
    node.desiredY = anchorCenter - (node.height / 2);
  });

  const nodes = [];
  categoryEntries.forEach(category => {
    const laneNodes = defaultNodes
      .filter(node => node.categoryKey === category.key)
      .sort((left, right) => left.desiredY - right.desiredY || left.y - right.y);

    let nextY = marginTop;
    laneNodes.forEach(node => {
      node.y = Math.max(node.desiredY, nextY);
      nextY = node.y + node.height + compactGap;
      nodes.push(node);
    });
  });
  nodes.sort((left, right) => left.x - right.x || left.y - right.y);

  const nodeByName = Object.fromEntries(nodes.map(node => [node.name, node]));
  const linkMap = new Map();
  relationships.forEach(rel => {
    if (!nodeByName[rel.parent] || !nodeByName[rel.child]) return;
    const key = `${rel.parent}->${rel.child}`;
    if (!linkMap.has(key)) linkMap.set(key, { parent: rel.parent, child: rel.child, optionalOnly: true });
    if (!rel.optional) linkMap.get(key).optionalOnly = false;
  });
  const links = [...linkMap.values()].map(link => ({ ...link, sameLaneOffset: 0 }));
  const sameLaneGroups = new Map();
  links.forEach(link => {
    const parentNode = nodeByName[link.parent];
    const childNode = nodeByName[link.child];
    if (!parentNode || !childNode || parentNode.categoryKey !== childNode.categoryKey) return;
    const key = parentNode.categoryKey;
    if (!sameLaneGroups.has(key)) sameLaneGroups.set(key, []);
    sameLaneGroups.get(key).push(link);
  });
  sameLaneGroups.forEach(group => {
    group
      .sort((left, right) => {
        const leftParent = nodeByName[left.parent];
        const rightParent = nodeByName[right.parent];
        const leftChild = nodeByName[left.child];
        const rightChild = nodeByName[right.child];
        return leftParent.y - rightParent.y || leftChild.y - rightChild.y || left.parent.localeCompare(right.parent) || left.child.localeCompare(right.child);
      })
      .forEach((link, index) => {
        link.sameLaneOffset = getRelationshipLaneOffset(index);
      });
  });

  const height = Math.max(...nodes.map(node => node.y + node.height)) + marginBottom;
  const clusters = categoryEntries.map((category, index) => ({
    title: category.title,
    x: marginX + index * (nodeWidth + horizontalGap) - clusterPad,
    y: 24,
    w: nodeWidth + (clusterPad * 2),
    h: height - 36,
    tone: category.tone,
  }));

  return {
    width,
    height,
    nodes,
    nodeByName,
    links,
    clusters,
  };
}
function getEdgeAnchor(fromNode, toNode) {
  const fromCx = fromNode.x + fromNode.width / 2;
  const fromCy = fromNode.y + fromNode.height / 2;
  const toCx = toNode.x + toNode.width / 2;
  const toCy = toNode.y + toNode.height / 2;
  const dx = toCx - fromCx;
  const dy = toCy - fromCy;

  if (Math.abs(dx) >= Math.abs(dy)) {
    return { x: fromNode.x + (dx > 0 ? fromNode.width : 0), y: fromCy };
  }
  return { x: fromCx, y: fromNode.y + (dy > 0 ? fromNode.height : 0) };
}
function renderRelationshipInspector(name) {
  const table = name ? getSchemaTable(name) : null;
  if (!table) {
    return `<div class="relationship-map-inspector-empty">Hover or click a table to inspect its description and schema.</div>`;
  }

  const primaryKeyColumns = (table.columns || []).filter(column => column.pk).map(column => column.name);
  const foreignKeyByColumn = Object.fromEntries((table.foreign_keys || []).map(fk => [fk.from, fk]));
  const route = getRouteForModel(name);
  const actions = route
    ? `<div class="relationship-inspector-actions"><button class="btn btn-sm" onclick="navigate('${route}')">Go</button></div>`
    : '';

  return `
    <h3>${escapeHtml(titleizeModelName(name))}</h3>
    <div class="relationship-inspector-description" style="margin:8px 0 16px">${escapeHtml(getModelDescription(name))}</div>
    <div class="field-grid" style="margin-bottom:0">
      <div class="label">Rows</div><div>${table.row_count}</div>
      <div class="label">Primary Key</div><div>${primaryKeyColumns.length ? primaryKeyColumns.map(column => `<code>${escapeHtml(column)}</code>`).join(', ') : '<span style="color:var(--text2)">None</span>'}</div>
      <div class="label">Foreign Keys</div><div>${table.foreign_keys.length}</div>
    </div>
    <div class="detail-section">
      <h3>Columns</h3>
      <div class="table-container">
        <table>
          <thead><tr><th>Name</th><th>Type</th><th>Flags</th><th>References</th></tr></thead>
          <tbody>
            ${(table.columns || []).map(column => {
              const foreignKey = foreignKeyByColumn[column.name];
              return `<tr>
                <td><code>${escapeHtml(column.name)}</code></td>
                <td>${escapeHtml(column.type || 'TEXT')}</td>
                <td>
                  <div class="relationship-column-flags">
                    ${column.pk ? '<span class="tag tag-purple">pk</span>' : ''}
                    ${(column.notnull || column.pk) ? '<span class="tag tag-green">required</span>' : '<span class="tag tag-orange">nullable</span>'}
                    ${foreignKey ? '<span class="tag tag-blue">fk</span>' : ''}
                  </div>
                </td>
                <td style="color:var(--text2)">${foreignKey ? `<code>${escapeHtml(`${foreignKey.table}.${foreignKey.to}`)}</code>` : '<span style="color:var(--text2)">-</span>'}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
    ${actions}
  `;
}
function getActiveRelationshipName() {
  return state.relationshipMapHover || state.relationshipMapSelection || null;
}
function applyRelationshipFocusState() {
  const content = document.getElementById('content');
  if (!content) return;
  const nodeEls = content.querySelectorAll('[data-node-name]');
  const edgeEls = content.querySelectorAll('[data-edge-parent]');
  const name = getActiveRelationshipName();
  const connected = name ? getConnectedRelationshipNames(name) : null;

  nodeEls.forEach(el => {
    const nodeName = el.dataset.nodeName;
    el.classList.toggle('is-primary', Boolean(name) && nodeName === name);
    el.classList.toggle('is-related', Boolean(name) && nodeName !== name && connected.has(nodeName));
    el.classList.toggle('is-dimmed', Boolean(name) && !connected.has(nodeName));
  });

  edgeEls.forEach(el => {
    const isActive = Boolean(name) && (el.dataset.edgeParent === name || el.dataset.edgeChild === name);
    el.classList.toggle('is-active', isActive);
    el.classList.toggle('is-dimmed', Boolean(name) && !isActive);
  });

  const inspector = document.getElementById('relationship-map-inspector');
  if (inspector) inspector.innerHTML = renderRelationshipInspector(name);
}
function setRelationshipMapHover(name) {
  state.relationshipMapHover = name;
  applyRelationshipFocusState();
}
function clearRelationshipMapHover() {
  state.relationshipMapHover = null;
  applyRelationshipFocusState();
}
function selectRelationshipNode(name) {
  state.relationshipMapSelection = name;
  applyRelationshipFocusState();
}
function renderRelationshipMap() {
  const graph = buildRelationshipGraphLayout();
  if (!graph) return '<div class="loading">Schema not loaded</div>';

  const renderCluster = cluster => {
    return `
      <g>
        <rect class="relationship-cluster" x="${cluster.x}" y="${cluster.y}" width="${cluster.w}" height="${cluster.h}" rx="18" fill="${cluster.tone.cluster}"></rect>
        <text class="relationship-cluster-label" x="${cluster.x + 18}" y="${cluster.y + 26}">${cluster.title}</text>
      </g>
    `;
  };

  const renderEdge = edge => {
    const fromNode = graph.nodeByName[edge.parent];
    const toNode = graph.nodeByName[edge.child];
    const isSameLane = fromNode.categoryKey === toNode.categoryKey;
    const fromCenterX = fromNode.x + fromNode.width / 2;
    const toCenterX = toNode.x + toNode.width / 2;
    const direction = (toNode.y + toNode.height / 2) >= (fromNode.y + fromNode.height / 2) ? 1 : -1;
    const start = isSameLane && edge.sameLaneOffset
      ? {
          x: fromCenterX + edge.sameLaneOffset,
          y: direction > 0 ? fromNode.y + fromNode.height : fromNode.y,
        }
      : getEdgeAnchor(fromNode, toNode);
    const end = isSameLane && edge.sameLaneOffset
      ? {
          x: toCenterX + edge.sameLaneOffset,
          y: direction > 0 ? toNode.y : toNode.y + toNode.height,
        }
      : getEdgeAnchor(toNode, fromNode);
    const path = `M ${start.x} ${start.y} L ${end.x} ${end.y}`;
    return `<path class="relationship-edge${edge.optionalOnly ? ' optional' : ''}" data-edge-parent="${edge.parent}" data-edge-child="${edge.child}" d="${path.replace(/\s+/g, ' ').trim()}"></path>`;
  };

  const renderNode = node => {
    const groupClasses = 'relationship-node-group is-clickable';
    const titleStartY = node.lines.length > 1 ? (node.isSmall ? 23 : 27) : (node.isSmall ? 30 : 37);
    return `
      <g class="${groupClasses}" data-node-name="${node.name}" transform="translate(${node.x}, ${node.y})" onmouseenter="setRelationshipMapHover('${node.name}')" onmouseleave="clearRelationshipMapHover()" onclick="selectRelationshipNode('${node.name}')">
        <rect class="relationship-node-card" width="${node.width}" height="${node.height}" rx="14" fill="${node.tone.fill}" stroke="${node.tone.stroke}"></rect>
        <rect class="relationship-node-count-badge" x="${node.width - 40}" y="10" width="28" height="18" rx="9"></rect>
        <text class="relationship-node-count" x="${node.width - 26}" y="23">${node.row_count}</text>
        ${node.lines.map((line, index) => `<text class="relationship-node-title" x="${node.width / 2}" y="${titleStartY + (index * 14)}">${escapeHtml(line)}</text>`).join('')}
      </g>
    `;
  };

  return `
    ${renderPageHeader('Relationship Map', '', 'relationship_map')}
    <div class="relationship-map-shell">
      <div class="detail-card">
        <div class="relationship-map-notes">
          <div class="relationship-map-note"><strong>Reading the graph:</strong> solid arrows are required foreign keys, dashed arrows are nullable foreign keys, and any unmapped table falls into an <code>OTHER</code> lane.</div>
        </div>
      </div>

      <div class="relationship-map-scroll">
        <svg class="relationship-map-svg" viewBox="0 0 ${graph.width} ${graph.height}" role="img" aria-label="Relationship graph of ontology models">
          <defs>
            <marker id="relationship-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b90a0"></path>
            </marker>
          </defs>
          ${graph.clusters.map(renderCluster).join('')}
          ${graph.links.map(renderEdge).join('')}
          ${graph.nodes.map(renderNode).join('')}
        </svg>
      </div>

      <div class="detail-card" id="relationship-map-inspector">
        ${renderRelationshipInspector(getActiveRelationshipName())}
      </div>
    </div>
  `;
}

// --- Mutations ---
async function post(url, body) {
  const res = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  });
  const data = await res.json();
  await fetchAll();
  return data;
}

async function createUser() {
  const name = document.getElementById('new-user-name').value.trim();
  const email = document.getElementById('new-user-email').value.trim();
  if (!name || !email) return;
  const {id} = await post('/api/users/new', {name, email});
  navigate('users/' + id);
}

async function createPlayer(userId) {
  const uidEl = document.getElementById('new-player-user');
  const uid = userId || (uidEl ? parseInt(uidEl.value) : null);
  const name = document.getElementById('new-player-name').value.trim();
  if (!name || !uid) return;
  const {id} = await post(`/api/users/${uid}/create_player`, {name});
  navigate('players/' + id);
}

async function createPolicy(playerId) {
  const name = document.getElementById('new-policy-name').value.trim();
  if (!name) return;
  const {id} = await post(`/api/players/${playerId}/create_policy_version`, {name});
  navigate('policy_versions/' + id);
}

async function submitToLeague(playerId) {
  const policyId = parseInt(document.getElementById('submit-policy').value);
  const leagueId = parseInt(document.getElementById('submit-league').value);
  if (!policyId || !leagueId) return;
  await post(`/api/players/${playerId}/submit`, {policy_version_id: policyId, league_id: leagueId});
  navigate('players/' + playerId);
}

async function placeSubmission(subId) {
  const divId = parseInt(document.getElementById('place-division').value);
  if (!divId) return;
  await post(`/api/submissions/${subId}/place`, {division_id: divId});
  navigate('submissions/' + subId);
}

async function rejectSubmission(subId) {
  const notes = (document.getElementById('reject-notes')?.value || '').trim();
  await post(`/api/submissions/${subId}/reject`, {notes});
  navigate('submissions/' + subId);
}

            <h3>${link('players', p.id, p.name)}</h3>

        <div class="label">ID</div><div>${er.id}</div>
        <div class="label">Requester</div><div>${link('users', er.requester_user_id, er.requester_name)}</div>
        <div class="label">Variant</div><div>${tagLink('variants', er.variant_id, er.variant_name, 'green')}</div>
        <div class="label">Status</div><div><span class="tag tag-${er.status==='completed'?'green':er.status==='failed'?'red':'orange'}">${er.status}</span></div>
        <div class="label">Seed</div><div>${er.seed != null ? er.seed : '-'}</div>
        <div class="label">Notes</div><div>${er.notes || '<span style="color:var(--text2)">-</span>'}</div>
        <div class="label">Created</div><div>${er.created_at}</div>
      </div>
      ${erPolicies.length ? `<div class="detail-section"><h3>Policy Versions (${erPolicies.length})</h3>
        <div class="items">${erPolicies.map(p => tagLink('policy_versions', p.policy_version_id, p.policy_version_name, 'orange')).join(' ')}</div>
      </div>` : ''}
    </div>
  `;
}

function renderVariantDetail(id) {
  const v = state.variants.find(x => x.id === id);
  if (!v) return '<div class="loading">Variant not found</div>';
  const eps = state.episodes.filter(e => e.variant_id === id);
  let cfg = v.config;
  try { cfg = JSON.stringify(JSON.parse(v.config), null, 2); } catch(e) {}
  return `
    <div class="breadcrumb"><a onclick="navigate('variants')">Variants</a> / ${v.name}</div>
    <div class="page-header"><div><h2>${v.name}</h2><div class="subtitle">Variant configuration</div></div></div>
    <div class="detail-card">
      <div class="field-grid">
        <div class="label">ID</div><div>${v.id}</div>
        <div class="label">Config</div><div><pre style="margin:0;color:var(--green);font-size:12px">${cfg}</pre></div>
      </div>
      ${(() => { const mvs = state.mod_variants.filter(mv => mv.variant_id === id); return mvs.length ? `<div class="detail-section"><h3>Mods</h3><div class="items">${mvs.map(mv => `<div class="pill clickable" onclick="navigate('mods/${mv.mod_id}')"><span class="dot" style="background:var(--orange)"></span>${mv.mod_name}${mv.canonical?' <span class="tag tag-green" style="margin-left:4px">canonical</span>':''}</div>`).join('')}</div></div>` : ''; })()}
      <div class="detail-section"><h3>Episodes (${eps.length})</h3>
        <div class="items">${eps.map(e =>
          `<div class="pill clickable" onclick="navigate('episodes/${e.id}')"><span class="dot" style="background:var(--accent2)"></span>#${e.id} <span style="color:var(--text2)">seed:${e.seed}</span></div>`
        ).join('') || '<span style="color:var(--text2)">No episodes</span>'}</div>
      </div>
    </div>
  `;
}

function renderEpisodeDetail(id) {
  const e = state.episodes.find(x => x.id === id);
  if (!e) return '<div class="loading">Episode not found</div>';
  const eps = state.episode_policies.filter(ep => ep.episode_id === id).sort((a,b) => b.score - a.score);
  return `
    <div class="breadcrumb"><a onclick="navigate('episodes')">Episodes</a> / #${e.id}</div>
    <div class="page-header"><div><h2>Episode #${e.id}</h2><div class="subtitle">Variant ${e.variant_id} &middot; Seed ${e.seed}</div></div></div>
    <div class="detail-card">
      <div class="field-grid">
        <div class="label">ID</div><div>${e.id}</div>
        <div class="label">Variant</div><div>${link('variants', e.variant_id, e.variant_name)}</div>
        <div class="label">Seed</div><div>${e.seed}</div>
        <div class="label">Score</div><div><pre style="margin:0;color:var(--green);font-size:12px">${(() => { try { return JSON.stringify(JSON.parse(e.score || '{}'), null, 2); } catch(x) { return e.score; } })()}</pre></div>
      </div>
      <div class="detail-section"><h3>Rounds</h3>
        <div class="items">${state.round_episodes.filter(re => re.episode_id === id).map(re =>
          `<div class="pill clickable" onclick="navigate('rounds/${re.round_id}')"><span class="dot" style="background:var(--accent2)"></span>${re.round_notes || 'Round #'+re.round_id}</div>`
        ).join('') || '<span style="color:var(--text2)">No rounds</span>'}</div>
      </div>
      <div class="detail-section"><h3>Logs</h3>
        <div class="items">${state.episode_logs.filter(l => l.episode_id === id).map(l =>
          `<div class="pill"><span class="dot" style="background:var(--green)"></span>${l.log_uri}</div>`
        ).join('') || '<span style="color:var(--text2)">No logs</span>'}</div>
      </div>
      <div class="detail-section"><h3>Policies (${eps.length})</h3>
        <div class="table-container"><table>
          <thead><tr><th>#</th><th>Policy</th><th>Agent</th><th>Player</th><th>Score</th><th>Logs</th></tr></thead>
          <tbody>${eps.map((ep, i) => `<tr>
            <td>${i+1}</td>
            <td>${link('policy_versions', ep.policy_version_id, '<strong>'+ep.policy_version_name+'</strong>')}</td>
            <td><span class="tag tag-purple">${ep.agent_id}</span></td>
            <td>${link('players', ep.player_id, ep.player_name)}</td>
            <td><span class="tag tag-${i===0?'green':i===1?'blue':'purple'}">${ep.score}</span></td>
            <td style="color:var(--text2);max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ep.logs || '-'}</td>
          </tr>`).join('')}</tbody>
        </table></div>
      </div>
    </div>
  `;
}

function renderRoundDetail(id) {
  const r = state.rounds.find(x => x.id === id);
  if (!r) return '<div class="loading">Round not found</div>';
  let res = {}; try { res = JSON.parse(r.results || '{}'); } catch(e) {}
  const sorted = Object.entries(res).sort((a,b) => b[1]-a[1]);
  return `
    <div class="breadcrumb"><a onclick="navigate('rounds')">Rounds</a> / #${r.id}</div>
    <div class="page-header"><div><h2>${r.notes || 'Round #'+r.id}</h2><div class="subtitle">${r.division_name} &middot; ${r.league_name}</div></div></div>
    <div class="detail-card">
      <div class="field-grid">
        <div class="label">ID</div><div>${r.id}</div>
        <div class="label">Division</div><div>${tagLink('divisions', r.division_id, r.division_name, 'green')}</div>
        <div class="label">League</div><div>${r.league_name}</div>
        <div class="label">Game</div><div>${r.game_name}</div>
        <div class="label">Notes</div><div>${r.notes || '<span style="color:var(--text2)">-</span>'}</div>
      </div>
      <div class="detail-section"><h3>Results</h3>
        <div class="table-container"><table>
          <thead><tr><th>#</th><th>Policy</th><th>Score</th></tr></thead>
          <tbody>${sorted.map(([name, score], i) => `<tr>
            <td>${i+1}</td>
            <td><strong>${name}</strong></td>
            <td><span class="tag tag-${i===0?'green':i===1?'blue':'purple'}">${score}</span></td>
          </tr>`).join('')}</tbody>
        </table></div>
      </div>
      <div class="detail-section"><h3>Episodes</h3>
        <div class="items">${state.round_episodes.filter(re => re.round_id === id).map(re =>
          `<div class="pill clickable" onclick="navigate('episodes/${re.episode_id}')"><span class="dot" style="background:var(--green)"></span>Episode #${re.episode_id} <span style="color:var(--text2)">seed:${re.seed}</span></div>`
        ).join('') || '<span style="color:var(--text2)">No episodes</span>'}</div>
      </div>
    </div>
  `;
}

// --- Routing ---
const listViews = { users: renderUsers, players: renderPlayers, policy_versions: renderPolicyVersions, submissions: renderSubmissions, division_entries: renderDivisionEntries, division_entry_events: renderDivisionEntryEvents, games: renderGames, mods: renderMods, leagues: renderLeagues, divisions: renderDivisions, projects: renderProjects, episode_requests: renderExperienceRequests, rankings: renderRankings, variants: renderVariants, episodes: renderEpisodes, rounds: renderRounds, relationship_map: renderRelationshipMap };
const detailViews = { users: renderUserDetail, players: renderPlayerDetail, policy_versions: renderPolicyVersionDetail, submissions: renderSubmissionDetail, division_entries: renderDivisionEntryDetail, division_entry_events: renderDivisionEntryEventsDetail, games: renderGameDetail, mods: renderModDetail, leagues: renderLeagueDetail, divisions: renderDivisionDetail, projects: renderProjectDetail, episode_requests: renderExperienceRequestDetail, variants: renderVariantDetail, episodes: renderEpisodeDetail, rounds: renderRoundDetail };

function navigate(path) {
  const parts = path.split('/');
  const section = parts[0];
  const id = parts[1] ? parseInt(parts[1]) : null;
  state.relationshipMapHover = null;

  // Highlight sidebar
  const sidebarSection = id ? section : path;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.view === sidebarSection));

  // Render
  if (id && detailViews[section]) {
    document.getElementById('content').innerHTML = detailViews[section](id);
  } else if (listViews[section]) {
    document.getElementById('content').innerHTML = listViews[section]();
  } else {
    document.getElementById('content').innerHTML = listViews.users();
  }
  if (section === 'relationship_map') applyRelationshipFocusState();

  history.pushState(null, '', `/${path}`);
}

window.addEventListener('popstate', () => {
  const path = location.pathname.slice(1) || 'users';
  const parts = path.split('/');
  const section = parts[0];
  const id = parts[1] ? parseInt(parts[1]) : null;
  state.relationshipMapHover = null;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.view === section));
  if (id && detailViews[section]) {
    document.getElementById('content').innerHTML = detailViews[section](id);
  } else if (listViews[section]) {
    document.getElementById('content').innerHTML = listViews[section]();
  }
  if (section === 'relationship_map') applyRelationshipFocusState();
});

document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => navigate(el.dataset.view));
});

fetchAll().then(() => {
  const path = location.pathname.slice(1) || 'users';
  navigate(path);
});
</script>
</body>
</html>
