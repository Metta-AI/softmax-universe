<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Service Admin</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232733;
    --border: #2e3345;
    --text: #e1e4ed;
    --text2: #8b90a0;
    --accent: #6c5ce7;
    --accent2: #a29bfe;
    --green: #00cec9;
    --orange: #fdcb6e;
    --red: #ff7675;
    --blue: #74b9ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .app {
    display: flex;
    height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    flex-shrink: 0;
  }

  .sidebar h1 {
    font-size: 14px;
    padding: 0 20px 20px;
    color: var(--accent2);
    letter-spacing: 2px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    cursor: pointer;
    color: var(--text2);
    font-size: 13px;
    transition: all 0.15s;
  }

  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { color: var(--accent2); background: var(--surface2); border-right: 2px solid var(--accent); }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
  .nav-item .badge {
    margin-left: auto;
    background: var(--surface2);
    color: var(--text2);
    font-size: 11px;
    padding: 1px 7px;
    border-radius: 10px;
  }
  .nav-item.active .badge { background: var(--accent); color: white; }

  /* Main */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 30px;
  }

  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .page-header h2 {
    font-size: 20px;
    font-weight: 600;
  }

  .page-header .subtitle {
    color: var(--text2);
    font-size: 12px;
    margin-top: 4px;
  }

  /* Stats row */
  .stats {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    flex: 1;
  }

  .stat-card .label { color: var(--text2); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  .stat-card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
  .stat-card .value.purple { color: var(--accent2); }
  .stat-card .value.green { color: var(--green); }
  .stat-card .value.orange { color: var(--orange); }
  .stat-card .value.blue { color: var(--blue); }

  /* Table */
  .table-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    text-align: left;
    padding: 12px 16px;
    background: var(--surface2);
    color: var(--text2);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
  }

  tbody td {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }

  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }

  .tag-purple { background: rgba(108,92,231,0.2); color: var(--accent2); }
  .tag-green { background: rgba(0,206,201,0.2); color: var(--green); }
  .tag-orange { background: rgba(253,203,110,0.2); color: var(--orange); }
  .tag-blue { background: rgba(116,185,255,0.2); color: var(--blue); }
  .tag-red { background: rgba(255,118,117,0.2); color: var(--red); }

  /* Detail panels */
  .detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  .detail-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
  }

  .detail-card h3 {
    font-size: 15px;
    margin-bottom: 4px;
  }

  .detail-card .meta {
    color: var(--text2);
    font-size: 12px;
    margin-bottom: 12px;
  }

  .detail-card .items {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 12px;
    color: var(--text);
  }

  .pill .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .loading {
    color: var(--text2);
    padding: 40px;
    text-align: center;
  }

  a.link {
    color: var(--accent2);
    text-decoration: none;
    cursor: pointer;
  }
  a.link:hover { text-decoration: underline; }

  .pill.clickable, .tag.clickable {
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .pill.clickable:hover, .tag.clickable:hover { opacity: 0.8; }

  .breadcrumb {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 16px;
  }
  .breadcrumb a { color: var(--text2); text-decoration: none; cursor: pointer; }
  .breadcrumb a:hover { color: var(--accent2); }

  .detail-section {
    margin-top: 20px;
  }
  .detail-section h3 {
    font-size: 13px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .field-grid {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 8px 16px;
    font-size: 13px;
    margin-bottom: 20px;
  }
  .field-grid .label { color: var(--text2); }

  .action-bar {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .action-bar input, .action-bar select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 12px;
  }
  .action-bar input:focus, .action-bar select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    font-weight: 600;
  }
  .btn:hover { opacity: 0.9; }
  .btn-sm { padding: 4px 10px; font-size: 11px; }

  details[open] .collapse-arrow { transform: rotate(90deg); }
  details summary::-webkit-details-marker { display: none; }

  .nav-section {
    font-size: 10px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 12px 20px 4px;
    margin-top: 4px;
  }
</style>
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <h1>GameSvc</h1>

    <div class="nav-item" data-view="users">
      <span class="icon">◉</span> Users <span class="badge" id="badge-users">-</span>
    </div>
    <div class="nav-item" data-view="games">
      <span class="icon">◆</span> Games <span class="badge" id="badge-games">-</span>
    </div>
    <div class="nav-item" data-view="leagues">
      <span class="icon">▥</span> Leagues <span class="badge" id="badge-leagues">-</span>
    </div>
    <div class="nav-item" data-view="commissioners">
      <span class="icon">⚑</span> Commissioners <span class="badge" id="badge-commissioners">-</span>
    </div>
    <div class="nav-item" data-view="rankings">
      <span class="icon">★</span> Rankings <span class="badge" id="badge-rankings">-</span>
    </div>
    <div class="nav-item" data-view="submissions">
      <span class="icon">◇</span> Submissions <span class="badge" id="badge-submissions">-</span>
    </div>
    <div class="nav-item" data-view="placements">
      <span class="icon">◈</span> Placements <span class="badge" id="badge-placements">-</span>
    </div>
    <div class="nav-item" data-view="experience_requests">
      <span class="icon">✦</span> XP Requests <span class="badge" id="badge-experience_requests">-</span>
    </div>
    <div class="nav-item" data-view="episodes">
      <span class="icon">▶</span> Episodes <span class="badge" id="badge-episodes">-</span>
    </div>
    <div class="nav-item" data-view="rounds">
      <span class="icon">↻</span> Rounds <span class="badge" id="badge-rounds">-</span>
    </div>
  </nav>
  <main class="main" id="content">
    <div class="loading">Loading...</div>
  </main>
</div>

<script>
const state = {};

async function fetchAll() {
  const endpoints = ['users','players','policies','games','mods','commissioners','submissions','placements','placement_results','leagues','divisions','rank_users','rank_players','rank_policies','projects','status_updates','experience_requests','variants','mod_variants','episodes','episode_policies','episode_logs','rounds','round_episodes','player_league_memberships','division_policies'];
  const results = await Promise.all(endpoints.map(e => fetch(`/api/${e}`).then(r => r.json())));
  endpoints.forEach((e, i) => state[e] = results[i]);

  document.getElementById('badge-users').textContent = state.users.length;

  document.getElementById('badge-games').textContent = state.games.length;
  document.getElementById('badge-submissions').textContent = state.submissions.length;
  document.getElementById('badge-placements').textContent = state.placements.length;
  document.getElementById('badge-leagues').textContent = state.leagues.length;
  document.getElementById('badge-commissioners').textContent = state.commissioners.length;
  if (document.getElementById('badge-divisions')) document.getElementById('badge-divisions').textContent = state.divisions.length;
  document.getElementById('badge-experience_requests').textContent = state.experience_requests.length;
  document.getElementById('badge-rankings').textContent = state.rank_users.length + state.rank_players.length + state.rank_policies.length;
  document.getElementById('badge-episodes').textContent = state.episodes.length;
  document.getElementById('badge-rounds').textContent = state.rounds.length;
}

// --- Link helpers ---
function link(type, id, label, cls) {
  return `<a class="link ${cls||''}" onclick="navigate('${type}/${id}')">${label}</a>`;
}
function tagLink(type, id, label, color) {
  return `<span class="tag tag-${color} clickable" onclick="navigate('${type}/${id}')">${label}</span>`;
}
function pillLink(type, id, label, dotColor) {
  return `<div class="pill clickable" onclick="navigate('${type}/${id}')"><span class="dot" style="background:var(--${dotColor})"></span>${label}</div>`;
}
function divisionMembershipLink(dp, color) {
  const division = tagLink('divisions', dp.division_id, dp.division_name, color || 'purple');
  return dp.is_champion ? `${division} <span class="tag tag-green" style="font-size:10px">champion</span>` : division;
}
function policyDivisionLink(dp, color) {
  const policy = tagLink('policies', dp.policy_id, dp.policy_name, color || 'orange');
  return dp.is_champion ? `${policy} <span class="tag tag-green" style="font-size:10px">champion</span>` : policy;
}

// --- Mutations ---
async function post(url, body) {
  const res = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  });
  const data = await res.json();
  await fetchAll();
  return data;
}

async function createUser() {
  const name = document.getElementById('new-user-name').value.trim();
  const email = document.getElementById('new-user-email').value.trim();
  if (!name || !email) return;
  const {id} = await post('/api/users/new', {name, email});
  navigate('users/' + id);
}

async function createPlayer(userId) {
  const uidEl = document.getElementById('new-player-user');
  const uid = userId || (uidEl ? parseInt(uidEl.value) : null);
  const name = document.getElementById('new-player-name').value.trim();
  if (!name || !uid) return;
  const {id} = await post(`/api/users/${uid}/create_player`, {name});
  navigate('players/' + id);
}

async function createPolicy(playerId) {
  const name = document.getElementById('new-policy-name').value.trim();
  if (!name) return;
  const {id} = await post(`/api/players/${playerId}/create_policy`, {name});
  navigate('policies/' + id);
}

async function submitToLeague(playerId) {
  const policyId = parseInt(document.getElementById('submit-policy').value);
  const leagueId = parseInt(document.getElementById('submit-league').value);
  if (!policyId || !leagueId) return;
  await post(`/api/players/${playerId}/submit`, {policy_id: policyId, league_id: leagueId});
  navigate('players/' + playerId);
}

async function placeSubmission(subId) {
  const divId = parseInt(document.getElementById('place-division').value);
  if (!divId) return;
  await post(`/api/submissions/${subId}/place`, {division_id: divId});
  navigate('submissions/' + subId);
}

async function rejectSubmission(subId) {
  const notes = (document.getElementById('reject-notes')?.value || '').trim();
  await post(`/api/submissions/${subId}/reject`, {notes});
  navigate('submissions/' + subId);
}

// --- List views ---
function renderOverview() {
  return `
    <div class="page-header"><div><h2>Overview</h2><div class="subtitle">Game service administration dashboard</div></div></div>
    <div class="stats">
      <div class="stat-card" style="cursor:pointer" onclick="navigate('users')"><div class="label">Users</div><div class="value purple">${state.users.length}</div></div>
      <div class="stat-card" style="cursor:pointer" onclick="navigate('players')"><div class="label">Players</div><div class="value green">${state.players.length}</div></div>
      <div class="stat-card" style="cursor:pointer" onclick="navigate('policies')"><div class="label">Policies</div><div class="value orange">${state.policies.length}</div></div>
      <div class="stat-card" style="cursor:pointer" onclick="navigate('games')"><div class="label">Games</div><div class="value blue">${state.games.length}</div></div>
    </div>
    <div class="detail-grid">
      ${state.games.map(g => {
        const lgs = state.leagues.filter(l => l.game_id === g.id);
        return `<div class="detail-card">
          <h3>${link('games', g.id, g.name)}</h3>
          <div class="meta">${g.description} &middot; Owner: ${link('users', g.owner_id, g.owner_name)}</div>
          <div class="items">
            ${lgs.map(l => tagLink('leagues', l.id, l.name, 'blue')).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
}

function renderUsers() {
  return `
    <div class="page-header"><div><h2>Users</h2><div class="subtitle">${state.users.length} users, ${state.players.length} players</div></div></div>
    <div class="action-bar" style="margin-bottom:16px;border-top:none;margin-top:0;padding-top:0">
      <input id="new-user-name" placeholder="Name" />
      <input id="new-user-email" placeholder="Email" />
      <button class="btn btn-sm" onclick="createUser()">+ New User</button>
    </div>
    ${state.users.map(u => {
      const players = state.players.filter(p => p.user_id === u.id);
      return `<div class="detail-card" style="margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
          <h3 style="margin:0">${link('users', u.id, u.name)}</h3>
          <span style="color:var(--text2);font-size:12px">${u.email}</span>
          <span style="color:var(--text2);font-size:12px;margin-left:auto">${players.length} player${players.length!==1?'s':''}, ${players.reduce((n,p) => n + state.policies.filter(pol => pol.player_id === p.id).length, 0)} policies</span>
        </div>
        ${players.map(p => {
          const pols = state.policies.filter(pol => pol.player_id === p.id);
          const memberships = state.player_league_memberships.filter(m => m.player_id === p.id);
          return `<details style="margin-bottom:4px;background:var(--surface2);border-radius:6px;padding:0">
            <summary style="padding:8px 12px;cursor:pointer;font-size:13px;list-style:none;display:flex;align-items:center;gap:8px">
              <span style="font-size:10px;color:var(--text2);transition:transform 0.15s" class="collapse-arrow">&#9654;</span>
              ${link('players', p.id, '<strong>'+p.name+'</strong>')}
              <span style="color:var(--text2);font-size:12px">${pols.length} polic${pols.length!==1?'ies':'y'}</span>
              <span style="margin-left:auto">${memberships.map(m => tagLink('leagues', m.league_id, m.league_name, 'blue')).join(' ')}</span>
            </summary>
            <div style="padding:0 12px 10px">
            ${pols.length ? `<div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Policies</div>
            <div class="table-container" style="margin-bottom:10px"><table>
              <thead><tr><th>Policy</th><th>Description</th><th>Divisions</th><th>Notes</th></tr></thead>
              <tbody>${pols.map(pol => {
                const divPols = state.division_policies.filter(dp => dp.policy_id === pol.id);
                return `<tr>
                  <td>${link('policies', pol.id, '<strong>'+pol.name+'</strong>')}</td>
                  <td style="color:var(--text2)">${pol.description || '-'}</td>
                  <td>${divPols.map(dp => divisionMembershipLink(dp, 'purple')).join(' ') || '<span style="color:var(--text2)">-</span>'}</td>
                  <td style="color:var(--text2);font-size:11px">${pol.notes || '-'}</td>
                </tr>`;
              }).join('')}</tbody>
            </table></div>` : ''}
            ${(() => {
              const projects = state.projects.filter(pr => pr.player_id === p.id);
              if (!projects.length) return '';
              const statusColor = s => ({active:'green',paused:'orange',completed:'blue',archived:'red'}[s]||'purple');
              return `<div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Projects</div>
              ${projects.map(pr => {
                const updates = state.status_updates.filter(su => su.project_id === pr.id);
                return `<details style="margin-bottom:4px;background:var(--bg);border-radius:4px">
                  <summary style="padding:6px 10px;cursor:pointer;font-size:12px;list-style:none;display:flex;align-items:center;gap:8px">
                    <span style="font-size:9px;color:var(--text2)" class="collapse-arrow">&#9654;</span>
                    ${link('projects', pr.id, '<strong>'+pr.name+'</strong>')}
                    <span class="tag tag-${statusColor(pr.status)}">${pr.status}</span>
                    <span style="color:var(--text2);font-size:11px;margin-left:auto">${updates.length} update${updates.length!==1?'s':''}</span>
                  </summary>
                  ${updates.length ? `<div style="padding:4px 10px 8px"><div class="table-container"><table>
                    <thead><tr><th>Update</th><th>Created</th></tr></thead>
                    <tbody>${updates.map(su => `<tr>
                      <td>${su.content}</td>
                      <td style="color:var(--text2);font-size:11px;white-space:nowrap">${su.created_at}</td>
                    </tr>`).join('')}</tbody>
                  </table></div></div>` : '<div style="padding:4px 10px 8px;color:var(--text2);font-size:11px">No updates</div>'}
                </details>`;
              }).join('')}`;
            })()}
            ${!pols.length && !state.projects.filter(pr => pr.player_id === p.id).length ? '<div style="color:var(--text2);font-size:12px">No policies or projects</div>' : ''}
            </div>
          </details>`;
        }).join('') || '<div style="color:var(--text2);font-size:12px">No players</div>'}
      </div>`;
    }).join('')}
  `;
}

function renderPlayers() {
  return `
    <div class="page-header"><div><h2>Players</h2><div class="subtitle">${state.players.length} player profiles</div></div></div>
    <div class="action-bar" style="margin-bottom:16px;border-top:none;margin-top:0;padding-top:0">
      <select id="new-player-user">${state.users.map(u => `<option value="${u.id}">${u.name}</option>`).join('')}</select>
      <input id="new-player-name" placeholder="Player name" />
      <button class="btn btn-sm" onclick="createPlayer()">+ New Player</button>
    </div>
    <div class="table-container"><table>
      <thead><tr><th>ID</th><th>Name</th><th>User</th><th>Policies</th></tr></thead>
      <tbody>${state.players.map(p => {
        const pols = state.policies.filter(pol => pol.player_id === p.id);
        return `<tr>
          <td>${p.id}</td>
          <td>${link('players', p.id, p.name)}</td>
          <td>${link('users', p.user_id, p.user_name)}</td>
          <td>${pols.map(pol => tagLink('policies', pol.id, pol.name, 'orange')).join(' ')}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>
  `;
}

function renderPolicies() {
  return `
    <div class="page-header"><div><h2>Policies</h2><div class="subtitle">${state.policies.length} bots registered</div></div></div>
    <div class="table-container"><table>
      <thead><tr><th>ID</th><th>Name</th><th>Description</th><th>Player</th><th>User</th><th>Divisions</th></tr></thead>
      <tbody>${state.policies.map(pol => {
        const divPols = state.division_policies.filter(dp => dp.policy_id === pol.id);
        return `<tr>
          <td>${pol.id}</td>
          <td>${link('policies', pol.id, '<strong>'+pol.name+'</strong>')}</td>
          <td style="color:var(--text2);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${pol.description || '-'}</td>
          <td>${link('players', pol.player_id, pol.player_name)}</td>

    <div class="breadcrumb"><a onclick="navigate('episodes')">Episodes</a> / #${e.id}</div>
    <div class="page-header"><div><h2>Episode #${e.id}</h2><div class="subtitle">Variant ${e.variant_id} &middot; Seed ${e.seed}</div></div></div>
    <div class="detail-card">
      <div class="field-grid">
        <div class="label">ID</div><div>${e.id}</div>
        <div class="label">Variant</div><div>${link('variants', e.variant_id, e.variant_name)}</div>
        <div class="label">Seed</div><div>${e.seed}</div>
        <div class="label">Score</div><div><pre style="margin:0;color:var(--green);font-size:12px">${(() => { try { return JSON.stringify(JSON.parse(e.score || '{}'), null, 2); } catch(x) { return e.score; } })()}</pre></div>
      </div>
      <div class="detail-section"><h3>Rounds</h3>
        <div class="items">${state.round_episodes.filter(re => re.episode_id === id).map(re =>
          `<div class="pill clickable" onclick="navigate('rounds/${re.round_id}')"><span class="dot" style="background:var(--accent2)"></span>${re.round_notes || 'Round #'+re.round_id}</div>`
        ).join('') || '<span style="color:var(--text2)">No rounds</span>'}</div>
      </div>
      <div class="detail-section"><h3>Logs</h3>
        <div class="items">${state.episode_logs.filter(l => l.episode_id === id).map(l =>
          `<div class="pill"><span class="dot" style="background:var(--green)"></span>${l.log_uri}</div>`
        ).join('') || '<span style="color:var(--text2)">No logs</span>'}</div>
      </div>
      <div class="detail-section"><h3>Policies (${eps.length})</h3>
        <div class="table-container"><table>
          <thead><tr><th>#</th><th>Policy</th><th>Agent</th><th>Player</th><th>Score</th><th>Logs</th></tr></thead>
          <tbody>${eps.map((ep, i) => `<tr>
            <td>${i+1}</td>
            <td>${link('policies', ep.policy_id, '<strong>'+ep.policy_name+'</strong>')}</td>
            <td><span class="tag tag-purple">${ep.agent_id}</span></td>
            <td>${link('players', ep.player_id, ep.player_name)}</td>
            <td><span class="tag tag-${i===0?'green':i===1?'blue':'purple'}">${ep.score}</span></td>
            <td style="color:var(--text2);max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ep.logs || '-'}</td>
          </tr>`).join('')}</tbody>
        </table></div>
      </div>
    </div>
  `;
}

function renderRoundDetail(id) {
  const r = state.rounds.find(x => x.id === id);
  if (!r) return '<div class="loading">Round not found</div>';
  let res = {}; try { res = JSON.parse(r.results || '{}'); } catch(e) {}
  const sorted = Object.entries(res).sort((a,b) => b[1]-a[1]);
  return `
    <div class="breadcrumb"><a onclick="navigate('rounds')">Rounds</a> / #${r.id}</div>
    <div class="page-header"><div><h2>${r.notes || 'Round #'+r.id}</h2><div class="subtitle">${r.division_name} &middot; ${r.league_name}</div></div></div>
    <div class="detail-card">
      <div class="field-grid">
        <div class="label">ID</div><div>${r.id}</div>
        <div class="label">Division</div><div>${tagLink('divisions', r.division_id, r.division_name, 'green')}</div>
        <div class="label">League</div><div>${r.league_name}</div>
        <div class="label">Game</div><div>${r.game_name}</div>
        <div class="label">Notes</div><div>${r.notes || '<span style="color:var(--text2)">-</span>'}</div>
      </div>
      <div class="detail-section"><h3>Results</h3>
        <div class="table-container"><table>
          <thead><tr><th>#</th><th>Policy</th><th>Score</th></tr></thead>
          <tbody>${sorted.map(([name, score], i) => `<tr>
            <td>${i+1}</td>
            <td><strong>${name}</strong></td>
            <td><span class="tag tag-${i===0?'green':i===1?'blue':'purple'}">${score}</span></td>
          </tr>`).join('')}</tbody>
        </table></div>
      </div>
      <div class="detail-section"><h3>Episodes</h3>
        <div class="items">${state.round_episodes.filter(re => re.round_id === id).map(re =>
          `<div class="pill clickable" onclick="navigate('episodes/${re.episode_id}')"><span class="dot" style="background:var(--green)"></span>Episode #${re.episode_id} <span style="color:var(--text2)">seed:${re.seed}</span></div>`
        ).join('') || '<span style="color:var(--text2)">No episodes</span>'}</div>
      </div>
    </div>
  `;
}

// --- Routing ---
const listViews = { users: renderUsers, players: renderPlayers, policies: renderPolicies, submissions: renderSubmissions, placements: renderPlacements, games: renderGames, mods: renderMods, commissioners: renderCommissioners, leagues: renderLeagues, divisions: renderDivisions, projects: renderProjects, experience_requests: renderExperienceRequests, rankings: renderRankings, variants: renderVariants, episodes: renderEpisodes, rounds: renderRounds };
const detailViews = { users: renderUserDetail, players: renderPlayerDetail, policies: renderPolicyDetail, submissions: renderSubmissionDetail, placements: renderPlacementDetail, games: renderGameDetail, mods: renderModDetail, commissioners: renderCommissionerDetail, leagues: renderLeagueDetail, divisions: renderDivisionDetail, projects: renderProjectDetail, experience_requests: renderExperienceRequestDetail, variants: renderVariantDetail, episodes: renderEpisodeDetail, rounds: renderRoundDetail };

function navigate(path) {
  const parts = path.split('/');
  const section = parts[0];
  const id = parts[1] ? parseInt(parts[1]) : null;

  // Highlight sidebar
  const sidebarSection = id ? section : path;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.view === sidebarSection));

  // Render
  if (id && detailViews[section]) {
    document.getElementById('content').innerHTML = detailViews[section](id);
  } else if (listViews[section]) {
    document.getElementById('content').innerHTML = listViews[section]();
  } else {
    document.getElementById('content').innerHTML = listViews.users();
  }

  history.pushState(null, '', `/${path}`);
}

window.addEventListener('popstate', () => {
  const path = location.pathname.slice(1) || 'users';
  const parts = path.split('/');
  const section = parts[0];
  const id = parts[1] ? parseInt(parts[1]) : null;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.view === section));
  if (id && detailViews[section]) {
    document.getElementById('content').innerHTML = detailViews[section](id);
  } else if (listViews[section]) {
    document.getElementById('content').innerHTML = listViews[section]();
  }
});

document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => navigate(el.dataset.view));
});

fetchAll().then(() => {
  const path = location.pathname.slice(1) || 'users';
  navigate(path);
});
</script>
</body>
</html>
